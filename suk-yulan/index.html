<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yulan</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 300px;
    }

    .container {
      display: flex;
      flex-direction: row;
    }

    .letter {
      transition: color 0.3s ease;
    }

    .y:hover {
      color: red; 
    }

    .u:hover {
      color: orange; 
    }

    .l:hover {
      color: yellow;
    }

    .a:hover {
      color: green; 
    }

    .n:hover {
      color: blue; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="letter y">Y</div>
    <div class="letter u">U</div>
    <div class="letter l">L</div>
    <div class="letter a">A</div>
    <div class="letter n">N</div>
  </div>
</body>
</html>
