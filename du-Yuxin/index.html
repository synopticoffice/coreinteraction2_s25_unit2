<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuxin Name Tag</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&display=swap');

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        .name {
            display: flex;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15vw;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
        }

        .letter {
            display: inline-block;
            transition: transform 0.3s ease-out, color 0.4s ease-in-out, text-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        /* 悬停时的变化 */
        .letter:hover {
            transform: scale(1.3) rotate(5deg);
            color: #63ebe9;
            text-shadow: 0px 0px 15px rgba(99, 235, 233, 0.8);
        }

        /* 按下时的弹性效果 */
        .letter:active {
            transform: scale(0.8) rotate(-5deg) translateY(10px);
            color: #ff3366;
        }

        /* 让字母有些轻微的浮动动画，增加活力 */
        @keyframes floaty {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .letter:nth-child(1) { animation: floaty 2s ease-in-out infinite; }
        .letter:nth-child(2) { animation: floaty 2s ease-in-out infinite 0.2s; }
        .letter:nth-child(3) { animation: floaty 2s ease-in-out infinite 0.4s; }
        .letter:nth-child(4) { animation: floaty 2s ease-in-out infinite 0.6s; }
        .letter:nth-child(5) { animation: floaty 2s ease-in-out infinite 0.8s; }

        @media (max-width: 900px) {
            .name {
                font-size: 20vw;
            }
        }

        @media (max-width: 650px) {
            .name {
                font-size: 25vw;
            }
        }

        @media (max-width: 450px) {
            .name {
                font-size: 30vw;
            }
        }
    </style>
</head>
<body>
    <div class="name">
        <span class="letter">Y</span>
        <span class="letter">U</span>
        <span class="letter">X</span>
        <span class="letter">I</span>
        <span class="letter">N</span>
    </div>
</body>
</html>
