<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elsa Name Tag</title>
  <link href="https://fonts.googleapis.com/css2?family=Colakind:wght@400..700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #fff8e7;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Colakind', sans-serif;
      position: relative;
    }

    .donut {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at center, #ffecb3 40%, transparent 41%);
      opacity: 0.7;
      animation: floatDonut 10s infinite ease-in-out;
      box-shadow: inset 0 0 0 12px #fbc02d;
      border: 25px solid #fdd835;
    }

    .donut:nth-child(1) {
      width: 100px; height: 100px;
      left: 10%; top: 50%;
      animation-delay: 0s;
    }

    .donut:nth-child(2) {
      width: 80px; height: 80px;
      left: 40%; top: 55%;
      animation-delay: 2s;
    }

    .donut:nth-child(3) {
      width: 120px; height: 120px;
      left: 70%; top: 60%;
      animation-delay: 4s;
    }

    @keyframes floatDonut {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-100px) rotate(180deg);
        opacity: 0.4;
      }
      100% {
        transform: translateY(-200px) rotate(360deg);
        opacity: 0;
      }
    }

    .name-tag {
      display: flex;
      gap: 2vw;
      z-index: 2;
    }

    .letter {
      font-size: 14vw;
      color: #ffb300;
      cursor: pointer;
      transition: transform 0.2s ease;
      display: inline-block;
    }

    .letter:hover {
      animation: hopTwice 0.6s ease;
      color: #f57f17;
      text-shadow: 2px 4px 8px rgba(255, 193, 7, 0.4);
    }

    .letter:active {
      transform: scale(0.95) rotate(5deg);
      color: #fff59d;
    }

    @keyframes hopTwice {
      0%   { transform: translateY(0); }
      20%  { transform: translateY(-20px); }
      40%  { transform: translateY(0); }
      60%  { transform: translateY(-10px); }
      80%  { transform: translateY(0); }
      100% { transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .letter { font-size: 16vw; }
    }

    @media (max-width: 650px) {
      .letter { font-size: 18vw; }
    }

    @media (max-width: 450px) {
      .letter { font-size: 20vw; }
    }
  </style>
</head>
<body>
  <div class="donut"></div>
  <div class="donut"></div>
  <div class="donut"></div>

  <div class="name-tag">
    <span class="letter">E</span>
    <span class="letter">L</span>
    <span class="letter">S</span>
    <span class="letter">A</span>
  </div>
</body>
</html>
