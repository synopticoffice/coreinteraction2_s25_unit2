<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>daniel jung - Interactive Composition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background-color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Reenie Beanie', cursive;
      overflow: hidden;
    }

    .name-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      height: 100%;
      padding: 20px;
    }

    .letter {
      font-size: 10vw;
      color: white;
      transition: all 0.3s ease;
      cursor: pointer;
      user-select: none;
    }

    .letter:hover {
      transform: scale(1.3) rotate(5deg);
      color: #f0a;
    }

    .letter:active {
      transform: scale(0.9) rotate(-10deg);
      color: #0ff;
    }

    /* Responsive tweaks */
    @media (max-width: 900px) {
      .letter {
        font-size: 12vw;
      }
    }

    @media (max-width: 650px) {
      .letter {
        font-size: 14vw;
      }
    }

    @media (max-width: 450px) {
      .letter {
        font-size: 16vw;
      }
    }
  </style>
</head>
<body>
  <div class="name-container">
    <span class="letter">d</span>
    <span class="letter">a</span>
    <span class="letter">n</span>
    <span class="letter">i</span>
    <span class="letter">e</span>
    <span class="letter">l</span>
    <span class="letter">&nbsp;</span>
    <span class="letter">j</span>
    <span class="letter">u</span>
    <span class="letter">n</span>
    <span class="letter">g</span>
  </div>

  <script>
    document.querySelectorAll('.letter').forEach(letter => {
      letter.addEventListener('mouseenter', () => {
        letter.style.transition = 'transform 0.2s ease, color 0.2s ease';
        letter.style.transform = `scale(${1 + Math.random() * 0.5}) rotate(${(Math.random() - 0.5) * 20}deg)`;
      });

      letter.addEventListener('mouseleave', () => {
        letter.style.transform = 'none';
        letter.style.color = 'white';
      });

      letter.addEventListener('click', () => {
        letter.style.color = '#0ff';
        letter.style.transform = `scale(${0.9 + Math.random() * 0.2}) rotate(${(Math.random() - 0.5) * 30}deg)`;
      });
    });
  </script>
</body>
</html>
