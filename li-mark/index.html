<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    
    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.7;
      animation: pulse 10s infinite ease-in-out;
      z-index: 999;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }
    .circle.one {
      width: 200px;
      height: 200px;
      background: #ffcc00;
      top: 10%;
      left: 5%;
    }
    .circle.two {
      width: 150px;
      height: 150px;
      background: #00ccff;
      bottom: 15%;
      right: 10%;
    }
    .circle.three {
      width: 100px;
      height: 100px;
      background: #ff6699;
      top: 50%;
      left: 80%;
    }
    
    #composition {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle, #ffffff, #ffffff);
      transition: transform 0.5s ease;
    }
    @media (max-width: 450px) {
      #composition {
        transform: rotate(90deg);
      }
    }
    
    .letter {
      font-family: 'Roboto Flex', sans-serif;
      font-size: 20vw;
      font-variation-settings: 'wght' 400, 'opsz' 96;
      transition: transform 0.3s ease, color 0.3s ease, text-shadow 0.3s ease;
      cursor: pointer;
      margin: 0 0.5vw;
      user-select: none;
      position: relative;
    }

    .instruction {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      color: #333;
      text-align: center;
      font-family: 'Roboto Flex', sans-serif;
      z-index: 1000;
    }
    
    .letter:nth-child(1):hover {
      transform: scale(1.1) rotate(5deg);
      color: #f3d07c;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .letter:nth-child(2):hover {
      transform: scale(1.1) translateY(-10px);
      color: #94e294;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .letter:nth-child(3):hover {
      transform: scale(1.1) skewX(10deg);
      color: #56aaf3;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .letter:nth-child(4):hover {
      transform: scale(1.1) rotate(-5deg);
      color: #a077d1;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }



    .letter.clicked {
      animation: bounce 0.5s;
    }
    @keyframes bounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .letter.rotate360 {
      animation: rotate360 0.6s forwards;
    }
    @keyframes rotate360 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (max-width: 900px) {
      .letter {
        font-size: 18vw;
      }
    }
    @media (max-width: 650px) {
      .letter {
        font-size: 20vw;
      }
    }
    @media (max-width: 450px) {
      .letter {
        font-size: 25vw;
      }
    }
  </style>
</head>

<body>
  <div class="circle one"></div>
  <div class="circle two"></div>
  <div class="circle three"></div>
  <div class="instruction"> Double click on the letters to see the effects!</div>

  <div id="composition">
    <span class="letter">M</span>
    <span class="letter">A</span>
    <span class="letter">R</span>
    <span class="letter">K</span>
  </div>
  
  <script>
    
    document.querySelectorAll('.letter').forEach(letter => {
      letter.addEventListener('click', function () {
        letter.classList.add('clicked');
        setTimeout(() => {
          letter.classList.remove('clicked');
        }, 500);
      });
      
      letter.addEventListener('dblclick', function () {
        letter.classList.add('rotate360');
        setTimeout(() => {
          letter.classList.remove('rotate360');
        }, 600);
      });
    });
  </script>
</body>
</html>
