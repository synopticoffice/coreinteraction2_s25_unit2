<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name Here</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Honk&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
            font-family: HONK;
            overflow: hidden;
        }

        .masked-text1,
        .masked-text2,
        .masked-text3 {
            font-weight: bold;
            color: transparent;
            background-image: url(doodle.jpeg);
            background-size: 150%; 
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: background-position 5s ease-in-out; 
        }

        .masked-text1 {
            font-size: 450px;
        }

        .masked-text2 {
            font-size: 194px;
        }

        .masked-text3 {
            font-size: 117px;
            text-align: center;
        }

        .masked-text1:hover,
        .masked-text2:hover,
        .masked-text3:hover {
            animation: animate-background 5s infinite alternate linear;
        }

        @keyframes animate-background {
            0% {
                background-position: 0 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        h1 {
            font-size: 450px;
            font-family: Honk;
            text-align: center;
            margin-top: 0PX;
        }

        h2 {
            font-size: 194px;
            font-family: Honk;
            text-align: center;
            margin-top: -510px;
        }

        h3 {
            font-size: 117px;
            font-family: Honk;
            text-align: center;
            margin-top: -260px;
        }

        .honk-large {
            font-family: "Honk", system-ui;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "MORF" 15,
                "SHLN" 50;
        }
    </style>
</head>
<body>
    <div class="masking-container">
        <h1 class="masked-text1">JS</h1>
        <h2 class="masked-text2">JULIA</h2>
        <h3 class="masked-text3">SCHREIER</h3>
    </div>
</body>
</html>
