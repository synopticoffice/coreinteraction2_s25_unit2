<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betty!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Puppies+Play&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(pink, lightsalmon, lightcoral, palevioletred, lightpink);
    }

    .parent-box {
      background-color: white;
      padding: 20px 20px 100px 20px;
      border-radius: 20px;
      /* Makes the box rounded */
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      /* Soft shadow */
      width: 80%;
      max-width: 900px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .grid-item-1 {
      color: white;
      background-color: pink;
      padding: 20px;
      text-align: center;
      font-size: 5vw;

    }

    .grid-item-1:hover {
      color: hotpink;
      font-family: "Puppies Play", cursive;
      font-weight: 400;
      font-style: normal;
    }

    .grid-item-1:active {
      color: hotpink;
      font-family: "Puppies Play", cursive;
      font-weight: 1000;
      font-style: normal;

    }

    .grid-item-2 {
      color: white;
      background-color: lightsalmon;
      padding: 20px;
      text-align: center;
      font-size: 5vw;

    }

    .grid-item-2:hover {
      color: chocolate;
      font-family: "Puppies Play", cursive;
      font-weight: 400;
      font-style: normal;
    }

    .grid-item-2:active {
      color: chocolate;
      font-family: "Puppies Play", cursive;
      font-weight: 1000;
      font-style: normal;

    }

    .grid-item-3 {
      color: white;
      background-color: lightcoral;
      padding: 20px;
      text-align: center;
      font-size: 5vw;

    }

    .grid-item-3:hover {
      color: brown;
      font-family: "Puppies Play", cursive;
      font-weight: 400;
      font-style: normal;
    }

    .grid-item-3:active {
      color: brown;
      font-family: "Puppies Play", cursive;
      font-weight: 1000;
      font-style: normal;

    }

    .grid-item-4 {
      color: white;
      background-color: palevioletred;
      padding: 20px;
      text-align: center;

      font-size: 5vw;

    }

    .grid-item-4:hover {
      color: darkred;
      font-family: "Puppies Play", cursive;
      font-weight: 400;
      font-style: normal;
    }

    .grid-item-4:active {
      color: darkred;
      font-family: "Puppies Play", cursive;
      font-weight: 1000;
      font-style: normal;

    }

    .grid-item-5 {
      color: white;
      background-color: lightpink;
      padding: 20px;
      text-align: center;
      font-size: 5vw;

    }

    .grid-item-5:hover {
      color: violet;
      font-family: "Puppies Play", cursive;
      font-weight: 400;
      font-style: normal;
    }

    .grid-item-5:active {
      color: violet;
      font-family: "Puppies Play", cursive;
      font-weight: 1000;
      font-style: normal;

    }

    .box-title {
      margin-top: 0;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 5vw;
      padding: 50px;
      color: palevioletred;
      text-align: center;
      /* Centers the text */
      display: block;
      font-family: "DynaPuff", system-ui;
      font-optical-sizing: auto;
      font-weight: <weight>;
      font-style: normal;
      font-variation-settings:
        "wdth" 100;
    }
  </style>
</head>

<body>
  <div class="parent-box">
    <h2 class="box-title">Hello, my name is</h2>
    <div class="grid-container">
      <div class="grid-item-1">B</div>
      <div class="grid-item-2">E</div>
      <div class="grid-item-3">T</div>
      <div class="grid-item-4">T</div>
      <div class="grid-item-5">Y</div>
    </div>
  </div>


</body>

</html>
