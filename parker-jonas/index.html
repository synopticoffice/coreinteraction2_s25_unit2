<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Jonas Parker</title>

      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Slackey&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  </head>

<style>
  body{
    background-color: black;
  }
  .name{
    font-size: 25vw;
    margin-left: 1vw;
    margin-top: 30vh;
    letter-spacing: -2vw;
    color: rgb(0, 26, 255);

    font-family: "Roboto", sans-serif;
    font-weight: 900;
  }

  .J:hover, .O:hover, .N:hover, .A:hover, .S:hover{
    font-weight: 100;
    transition: ease 0.5s;
  color: rgb(242, 255, 0);
  }

  .J:active, .O:active, .N:active, .A:active, .S:active{
    transition: ease 0.5s;
    color: rgb(255, 0, 0);
    font-size: 30vw;
    font-weight: 900;
  }


</style>

  <body>
  
<p>
  <div class="name">
  <span class="J">J</span>
  <span class="O">O</span>
  <span class="N">N</span>
  <span class="A">A</span>
  <span class="S">S</span>
</div>

</p>



  </body>
  </html>
