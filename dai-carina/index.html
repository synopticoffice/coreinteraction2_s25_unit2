<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carina</title>
  <link rel="stylesheet" href="https://use.typekit.net/iih8ujf.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #787878;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: chandler-42-regular, sans-serif;
      font-style: normal;
      font-weight: 300;
    }

    .name {
      display: flex;
      gap: 1vw;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .letter {
      font-size: 12vw;
      color: #fcf6ce;
      padding: 3rem; 
      border-radius: 2rem;
      transition: transform 0.5s ease-out;
      animation: floaty 3s ease-in-out infinite alternate;
      cursor: pointer;
    }

    .letter-c { background: #4f4f4f; animation-delay: 0s; }
    .letter-a1 { background: #4f4f4f; animation-delay: 0.2s; }
    .letter-r { background: #4f4f4f;animation-delay: 0.4s; }
    .letter-i { background: #a2d2ff; animation-delay: 0.6s; }
    .letter-n { background: #cfcfcf; animation-delay: 0.8s; }
    .letter-a2 { background: #4f4f4f; animation-delay: 1s; }

    .letter:hover {
      transform: rotate(-5deg) scale(1.1);
      animation-play-state: paused;
    }

    .letter:active {
      animation: squish 0.4s ease forwards;
    }

    @keyframes floaty {
      from { transform: translateY(0px); }
      to { transform: translateY(10px); }
    }

    @keyframes squish {
      0%   { transform: scale(1) rotate(0); }
      30%  { transform: scale(1.3, 0.7) rotate(3deg); }
      60%  { transform: scale(0.9, 1.2) rotate(-3deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @media (max-width: 900px) {
      .letter {
        font-size: 16vw;
      }
    }

    @media (max-width: 650px) {
      .letter {
        font-size: 20vw;
      }
    }

    @media (max-width: 450px) {
      .name {
        flex-direction: column;
        gap: 1rem;
      }

      .letter {
        font-size: 22vw;
      }
    }
  </style>
</head>

<body>
  <div class="name">
    <span class="letter letter-c">C</span>
    <span class="letter letter-a1">A</span>
    <span class="letter letter-r">R</span>
    <span class="letter letter-i">I</span>
    <span class="letter letter-n">N</span>
    <span class="letter letter-a2">A</span>
  </div>
</body>
</html>
