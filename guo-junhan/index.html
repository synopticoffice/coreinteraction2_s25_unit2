<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Junhan</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wdth,wght@75..125,100..700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(270deg, #fffbf0, #e8f0ff, #fff0f5);
      background-size: 600% 600%;
      animation: bgMove 20s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Spline Sans Mono", monospace;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .name-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      gap: 1rem;
    }

    .letter {
      font-size: 15vw;
      font-variation-settings: "wght" 300;
      transition: transform 0.4s ease, font-variation-settings 0.4s ease;
      cursor: pointer;
      user-select: none;
      padding: 0.2em;
      border-radius: 0.2em;
      display: inline-block;
    }

    /* Unique letter colors */
    .letter:nth-child(1) { color: #ff6f91; --hover-scale: 1.3; }
    .letter:nth-child(2) { color: #ff9671; --hover-scale: 1.4; }
    .letter:nth-child(3) { color: #ffc75f; --hover-scale: 1.25; }
    .letter:nth-child(4) { color: #f9f871; --hover-scale: 1.5; }
    .letter:nth-child(5) { color: #8bd3dd; --hover-scale: 1.35; }
    .letter:nth-child(6) { color: #a084dc; --hover-scale: 1.45; }

    .letter:hover {
      animation: spin 0.6s linear;
      transform: scale(var(--hover-scale)) rotate(360deg);
      font-variation-settings: "wght" 700;
      filter: brightness(1.2);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .letter.clicked {
      animation: pop 0.5s ease-out forwards;
      text-shadow: 0 0 15px rgba(255, 182, 193, 0.7);
    }

    @keyframes pop {
      0% { transform: scale(1); }
      30% { transform: scale(1.5) rotate(10deg); }
      60% { transform: scale(0.9) rotate(-5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* Responsive font sizes */
    @media (max-width: 900px) {
      .letter { font-size: 12vw; }
    }

    @media (max-width: 650px) {
      .letter { font-size: 16vw; }
    }

    @media (max-width: 450px) {
      .letter { font-size: 20vw; }
    }
  </style>
</head>
<body>
  <div class="name-container">
    <span class="letter">J</span>
    <span class="letter">U</span>
    <span class="letter">N</span>
    <span class="letter">H</span>
    <span class="letter">A</span>
    <span class="letter">N</span>
  </div>

  <script>
    const letters = document.querySelectorAll('.letter');
    letters.forEach(letter => {
      letter.addEventListener('click', () => {
        letter.classList.add('clicked');
        setTimeout(() => {
          letter.classList.remove('clicked');
        }, 500);
      });
    });
  </script>
</body>
</html>
