<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sara Grant</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Mansalva&display=swap" rel="stylesheet">
  <style>
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      text-decoration: none;
    }
    .name {
      font-family: "Mali", sans-serif;
      display:inline;
      grid-column: auto;
      font-size: 60vh;
      transition: 1s;
      opacity: 0.5;
      text-align: center;
      font-weight: 300;
      text-decoration: none;
      color: black;
      transition: background-color 0.3s linear;
      cursor: pointer;

    }

    .name:hover {
      transition: 1s;
      opacity: 1;
      text-decoration: none;
    };

    .name:active {
      background-color: limegreen;
      opacity: 1;
    }

    @media (max-width: 450px) {
      .name {
        font-size: 20vh;
      }
    }

    @media (max-width: 650px) {
      .name {
        font-size: 40vh;
      }
    }

    @media (max-width: 900px) {

    }
  </style>
  </head>
  <body>
    <div class="container">
  <div class="name" >S</div>
  <div class="name" >a</div>
  <div class="name" >r</div>
  <div class="name" >a</div>
    </div>
  </body>
  </html>
