<!DOCTYPE html>
<html>
<head>
  <title>Rachel's Nametag</title>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Gochi Hand', cursive;
      background: #fceef1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .background-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #ffe6ef, transparent),
      radial-gradient(circle at 70% 70%, #ffddec, transparent);
      z-index: 0;
    }

    .nametag {
      background: rgba(248, 216, 228, 0.85);
      padding: 30px;
      border-radius: 25px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .intro {
      background: rgba(255, 214, 232, 0.75);
      padding: 10px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-size: 24px;
      color: #5a3e42;
    }

    .name span {
      display: inline-block;
      font-size: 10vw;
      margin: 5px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 12px;
      transition: 0.3s;
      cursor: pointer;
    }

    .name span:hover {
      background: rgba(255, 214, 232, 0.9);
      transform: scale(1.2) rotate(-5deg);
      color: rgba(193, 125, 137, 0.95);
    }

    .name span:active {
      transform: scale(1.25) rotate(5deg);
    }

    .bubble {
      position: absolute;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #fff0f7 40%, transparent 60%);
      border-radius: 50%;
      opacity: 0.4;
      animation: float 6s ease-in-out infinite;
      z-index: 0;
    }

    .bubble.one {
      top: -20px;
      left: -20px;
    }

    .bubble.two {
      bottom: -20px;
      right: -20px;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>
  <div class="nametag">
    <div class="bubble one"></div>
    <div class="bubble two"></div>
    <div class="intro">HELLO, MY NAME IS</div>
    <div class="name">
      <span>R</span>
      <span>a</span>
      <span>c</span>
      <span>h</span>
      <span>e</span>
      <span>l</span>
    </div>
  </div>
</body>
</html>
