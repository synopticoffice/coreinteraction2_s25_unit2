<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiwon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: content-box;
        }

        body {
            display: grid;
            place-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: black;
            color: white;
        }

        .name {
            font-size: 20em;
            text-align: center;
            font-variation-settings: "wght" 400;
            transition: transform 0.3s ease, color 0.3s ease, font-variation-settings 0.3s ease;
            cursor: pointer;
        }

        .name:hover {
            color: cyan;
            transform: scale(1.2);
            font-variation-settings: "wght" 700;
        }

        .name:active {
            color: magenta;
            transform: rotate(-10deg) scale(1.3);
            font-variation-settings: "wght" 900;
        }

        @media screen and (max-width: 900px) {
            .name {
                font-size: 10em;
            }
        }
        
        @media screen and (max-width: 650px) {
            .name {
                font-size: 5em;
            }
        }

        @media screen and (max-width: 450px) {
            .name {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="name">JIWON</div>
</body>
</html>
