<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Joselyn Perez</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
      <style>
        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }
    
        body, html {
          height: 100%;
          width: 100%;
          overflow: hidden;
          font-family: "Montserrat Alternates", sans-serif;
          background-color: #151515;
          display: flex;
          justify-content: center;
          align-items: center;
        }
    
        .box {
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
          justify-content: center;
          align-items: center;
          width: 100%;
          padding: 16px;
        }
    
        .letter {
          font-weight: 300;
          font-size: 280px;
          color: antiquewhite;
          transition: transform 0.2s ease, font-weight 0.2s ease, color 0.2s, text-shadow 0.2s;
          cursor: pointer;
          user-select: none;
          text-shadow: 0 0 10px antiquewhite, 0 0 20px antiquewhite;

        }
    
        .letter:hover {
          font-weight: 700;
          transform: scale(1.2) rotate(10deg);
          color: #ff405d;
          text-shadow: 0 0 10px #ff405d, 0 0 20px #ff405d;
        }
    
        .letter:active {
          transform: scale(0.9) rotate(-90deg);
          font-weight: 900;
          color: #ffa600;
          text-shadow: 0 0 10px #ffa600, 0 0 20px #ffa600;
        }
    
        @media (max-width: 900px) {
          .letter {
            font-size: 72px;
          }
        }
    
        @media (max-width: 650px) {
          .letter {
            font-size: 48px;
          }
        }
    
        @media (max-width: 450px) {
          .letter {
            font-size: 36px;
          }
        }
      </style>
  </head>
  <body>
    <div class="box">
      <div class="letter">J</div>
      <div class="letter">O</div>
      <div class="letter">S</div>
      <div class="letter">E</div>
      <div class="letter">L</div>
      <div class="letter">Y</div>
      <div class="letter">N</div>
    </div>
  </body>
  </html>
