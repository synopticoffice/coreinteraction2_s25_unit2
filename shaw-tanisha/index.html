<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TANISHA</title>

  <!-- Load Tourney Variable Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    body {
      background: #fdf6f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Tourney', cursive;
    }

    .name-tag {
      display: flex;
      gap: 0.6rem;
      font-size: 12vw;
    }

    .name-tag span {
      display: inline-block;
      animation: animateVars 4s ease-in-out infinite alternate;
      transition:
        font-style 0.4s ease,
        color 0.4s ease,
        text-shadow 0.4s ease,
        font-size 0.6s ease-in-out;
      font-variation-settings: "wght" 300, "wdth" 100;
      cursor: pointer;
      user-select: none;
      color: #222;
    }

 
    .T   { animation-delay: 0s; }
    .A   { animation-delay: 0.2s; }
    .N   { animation-delay: 0.4s; }
    .I   { animation-delay: 0.6s; }
    .S   { animation-delay: 0.8s; }
    .H   { animation-delay: 1s; }
    .A2  { animation-delay: 1.2s; }

    .name-tag span:hover {
      animation-play-state: paused;
      color: #ff007f;
      text-shadow: 0 0 10px rgba(255, 0, 127, 0.6),
                   0 0 20px rgba(255, 0, 127, 0.4);
    }

    .name-tag span.italic {
      font-style: italic;
    }

    @keyframes animateVars {
      0%   { font-variation-settings: "wght" 200, "wdth" 70; }
      25%  { font-variation-settings: "wght" 700, "wdth" 100; }
      50%  { font-variation-settings: "wght" 900, "wdth" 150; }
      75%  { font-variation-settings: "wght" 300, "wdth" 50; }
      100% { font-variation-settings: "wght" 600, "wdth" 120; }
    }
  </style>
</head>
<body>
  <div class="name-tag">
    <span class="T">T</span>
    <span class="A">A</span>
    <span class="N">N</span>
    <span class="I">I</span>
    <span class="S">S</span>
    <span class="H">H</span>
    <span class="A2">A</span>
  </div>

  <script>
    const letters = document.querySelectorAll('.name-tag span');

 
    letters.forEach(letter => {
      const startSize = Math.random() * 6 + 8; 
      letter.style.fontSize = `${startSize}vw`;

   
      letter.addEventListener('click', () => {
        letter.classList.toggle('italic');
      });

      letter.addEventListener('mouseenter', () => {
        const hoverSize = Math.random() * 6 + 8; 
        letter.style.fontSize = `${hoverSize}vw`;
      });
    });


    setInterval(() => {
      letters.forEach(letter => {
        const randomSize = Math.random() * 6 + 8; 
        letter.style.fontSize = `${randomSize}vw`;
      });
    }, 3000); 
  </script>
</body>
</html>
