<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Name - Betty</title>
  <link href="https://fonts.googleapis.com/css2?family=Globo&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Globo&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #F4CEDF;
      color: #EC7573;
      font-family: 'Globo', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .name {
      display: flex;
      width: 100%;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      padding: 1rem;
      z-index: 2;
    }

    .letter {
      font-size: 14vw;
      font-weight: 700;
      transition: transform 0.3s ease, color 0.3s ease;
      cursor: pointer;
      padding: 0 0.05em;
      letter-spacing: -0.05em;
      color: #EC7573;
    }

    .letter:hover {
      transform: scale(1.2) rotate(-5deg);
      color: #507DC5;
    }

    .letter:active {
      transform: scale(0.9) rotate(5deg);
      color: #F8E0BE;
    }

    @media (max-width: 900px) {
      .letter {
        font-size: 18vw;
      }
    }

    @media (max-width: 650px) {
      .letter {
        font-size: 22vw;
      }
    }

    @media (max-width: 450px) {
      .letter {
        font-size: 26vw;
      }
    }

    .bow {
      position: absolute;
      width: 40px;
      height: 40px;
      background-image: url("data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/69L2SlACEQAAAAEAANLsanVtYgAAAB5qdW1kYzJwYQARABCAAACqADibcQNjMnBhAAAANxZq...");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation: float 10s infinite ease-in-out;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      100% {
        transform: translateY(-10vh) translateX(30vw);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="name">
    <span class="letter">B</span>
    <span class="letter">E</span>
    <span class="letter">T</span>
    <span class="letter">T</span>
    <span class="letter">Y</span>
  </div>

  <!-- Floating Kitty-style bows -->
  <script>
    const createBows = () => {
      for (let i = 0; i < 20; i++) {
        const bow = document.createElement('div');
        bow.classList.add('bow');
        bow.style.left = Math.random() * 100 + 'vw';
        bow.style.animationDuration = 8 + Math.random() * 5 + 's';
        bow.style.width = bow.style.height = (30 + Math.random() * 30) + 'px';
        document.body.appendChild(bow);
      }
    };
    createBows();
  </script>
</body>
</html>
