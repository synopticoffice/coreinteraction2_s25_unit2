<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MABEL</title>
    <style>
      @font-face {
        font-family: 'swomp-gappy';
        src: url(SWOMP/Swomp-Gapy\ copy.ttf);
      }
      @font-face {
        font-family: 'swomp-gappy2';
        src: url(SWOMP/Swomp-Gapy2\ copy.ttf);
      }
      @font-face {
        font-family: 'swomp-sloppy';
        src: url(SWOMP/Swomp-Sloppy\ copy.ttf);
      }

      body{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow: scroll;
      }
      #container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
      }
      .letter {
        font-size: 300px;
      }
      .mabel-m {
        font-family: 'swomp-sloppy';
      }
      .a{
        font-family: 'swomp-gappy';
        position: relative;
        display: inline-block;
        transition: transform 2s ease, color 1s ease;
      }
      .a:hover {
        text-transform: lowercase;
        transform: rotateY(720deg) scale(0.80);
        color: blue;
      }
      .b{
        font-family: 'swomp-sloppy';
        position: relative;
        cursor: pointer;
        perspective: 1000px;
      }
      .b-inner {
        font-family: 'swomp-gappy';
        position: relative;
        top: 0;
        left: 0;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }
      .b:hover .b-inner{
        color: rgb(138, 55, 138);
        transform: rotateY(180deg);
      }

      .e{
        font-family: 'swomp-gappy2';
        position: relative;
        display: inline-block;
        transition: transform 2s ease, color 1s ease;
      }
      .e:hover {
        transform: rotateX(360deg) scale(0.80);
        color: rgb(255, 125, 164);
      }
      .l{
        font-family: 'swomp-sloppy';
        position: relative;
        z-index: 1;
      }
      .l .flame-l {
        font-family: 'swomp-gappy2';
        position: absolute;
        top: 0;
        left: 0;
        z-index: -1;
        color: rgb(255, 89, 0);
        opacity: 0;
        filter: blur(9px) brightness(1.2);
        transform: scale(0.7);
        transition: opacity 1s ease, transform 0.6s ease;
        pointer-events: none;
        text-shadow: 0 0 10px rgb(255, 68, 16), 0 0 20px rgb(255, 149, 0), 0 0 30px yellow;
      }
      .l:hover .flame-l {
        opacity: 1;
        transform: scale(1.1);
        animation: flicker 3s infinite ease-in-out;
      }
      @keyframes flicker {
        0% {opacity: 0.9; transform: scale(1) translateY(0); }
        25% {opacity: 0.7; transform: scale(1.02) translateY(-1px); }
        50% {opacity: 1; transform: scale(1.03) translateY(-2px); }
        75% {opacity: 0.8; transform: scale(1.01) translateY(-1px); }
        100% {opacity: 0.95; transform: scale(1) translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="letter mabel-m">
        M
      </div>
      <div class="letter a">
        a
      </div>
      <div class="letter b">
        <div class="letter b-inner">
          B
        </div>
        B
      </div>
      
      <div class="letter e">
        E
      </div>
      <div class="letter l">
          L
          <span class="flame-l">L</span>
      </div>
    </div>
    
  </body>
  </html>
