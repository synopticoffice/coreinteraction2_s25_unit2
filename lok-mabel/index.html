<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>MABEL</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'swomp-gappy';
        src: url(SWOMP/Swomp-Gapy\ copy.ttf);
      }
      @font-face {
        font-family: 'swomp-gappy2';
        src: url(SWOMP/Swomp-Gapy2\ copy.ttf);
      }
      @font-face {
        font-family: 'swomp-sloppy';
        src: url(SWOMP/Swomp-Sloppy\ copy.ttf);
      }

      body{
        cursor: vertical-text;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        overflow: scroll;
      }
      #container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
      }
      .letter {
        font-size: 300px;
      }
      .mabel-m {
        font-family: 'swomp-sloppy';
        display: inline-block;
        position: relative;
        transition: transform 2.5s ease, color 1s ease;
      }
      .mabel-m:hover {
        transform: rotate(1080deg) scale(1.5) translate(-5px, 0);
        color: rgb(116, 0, 0);
      }
    
      .a{
        font-family: 'swomp-gappy';
        position: relative;
        display: inline-block;
        transition: transform 2s ease, color 1s ease;
      }
      .a:hover {
        text-transform: lowercase;
        transform: rotateY(720deg) scale(0.80);
        color: blue;
      }
      .b{
        font-family: 'swomp-sloppy';
        position:relative;
        color: transparent;
      }
      .b span:nth-child(1){
        position: absolute;
        top:0; left:0; color: #000;
        transition:0.5s;
        clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
        overflow: hidden;
      }
      b:hover span:nth-child(1){
        transform:translateY(-30px); 
      }
      .b span:nth-child(2){
        position:absolute;
        top:0; left:0; color: #000;
        transition:0.8s;
        clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
        overflow:hidden;
      }
      .b:hover span:nth-child(2){
        transform:translateY(30px); 
      }
      .b span:nth-child(3){
        position:absolute;
        top:50%; left: 0;
        transform:translateY(-50%) scaleY(0);
        width: 91%; color: #ffffff;
        background:rgb(84, 2, 106);
        font-family:"Raleway", sans-serif;
        font-weight: 100; /* 100 to 900 */
            font-variation-settings: "grad" -50, /* -50 to 100 */
                                     "wdth" 50; /* 50 to 150 */
        font-size: 15px;
        text-align:center;
        margin-left: -5px;
        padding: 10px 0px 10px 10px;
        transition:0.8s;
        border-radius: 1em;
      }
      .b:hover span:nth-child(3){
        transform:translateY(0) scaleY(1);
        animation: variable 3s ease infinite;
      
      }
      @keyframes variable {
        0% {
        font-weight: 100;
        font-variation-settings: "grad" 50,
                                  "wdth" 50;
    }
        25% {
            font-weight: 300;
            font-variation-settings: "grad" -50,
                                      "wdth" 50;
        }
        50% {
            font-weight: 900;
            font-variation-settings: "grad" 100,
                                      "wdth" 50;
        }
        75% {
            font-weight: 500;
            font-variation-settings: "grad" -50,
                                      "wdth" 150;
        }
        100% {
            font-weight: 200;
            font-variation-settings: "grad" 50,
                                      "wdth" 50;
        }
      }
      .e{
        font-family: 'swomp-gappy2';
        position: relative;
        display: inline-block;
        transition: transform 2s ease, color 1s ease;
      }
      .e:hover {
        transform: rotateX(360deg) scale(0.80);
        color: rgb(255, 125, 164);
      }
      .l{
        font-family: 'swomp-sloppy';
        position: relative;
        z-index: 1;
      }
      .l .flame-l {
        font-family: 'swomp-gappy2';
        position: absolute;
        top: 0;
        left: 0;
        z-index: -1;
        color: rgb(255, 89, 0);
        opacity: 0;
        filter: blur(9px) brightness(1.2);
        transform: scale(0.7);
        transition: opacity 1s ease, transform 0.6s ease;
        pointer-events: none;
        text-shadow: 0 0 10px rgb(255, 68, 16), 0 0 20px rgb(255, 149, 0), 0 0 30px yellow;
      }
      .l:hover .flame-l {
        opacity: 1;
        transform: scale(1.1);
        animation: flicker 3s infinite ease-in-out;
      }
      @keyframes flicker {
        0% {opacity: 0.9; transform: scale(1) translateY(0); }
        25% {opacity: 0.7; transform: scale(1.02) translateY(-1px); }
        50% {opacity: 1; transform: scale(1.03) translateY(-2px); }
        75% {opacity: 0.8; transform: scale(1.01) translateY(-1px); }
        100% {opacity: 0.95; transform: scale(1) translateY(0); }
      }

      @media screen and (max-width: 450px) {
        #container {
          flex-direction: column;
          align-items: center;
          gap: 8px;
        }

        .letter {
          font-size: 120px;
        }
        .mabel-m {
        font-family: 'swomp-sloppy';
        display: inline-block;
        position: relative;
        transition: transform 0.4s ease, opacity 0.4s ease;
      }
        .mabel-m:active {
          transform: scale(1.2) rotate(5deg);
          opacity: 0.8;
      }

      .a:active {
        text-transform: lowercase;
        transform: rotateY(720deg) scale(0.80);
        color: blue;
      }

      .b:active span:nth-child(1){
        transform:translateY(-30px); 
      }

      .b:active span:nth-child(2){
        transform:translateY(30px); 
      }

      .b:active span:nth-child(3){
        transform:translateY(0) scaleY(1);
      }
      .b span:nth-child(3){
        position:absolute;
        top:50%; left: 0;
        transform:translateY(-50%) scaleY(0);
        width: 100%; color: #ffffff;
        background:rgb(84, 2, 106);
        font-family: monospace;
        font-weight: bold;
        font-size: 10px;
        text-align:center;
        margin-left: -5px;
        padding: 10px 10px 10px 10px;
        transition:0.8s;
        border-radius: 1em;
      }

      .e:active {
        transform: rotateX(360deg) scale(0.80);
        color: rgb(255, 125, 164);
      }

      .l:active .flame-l {
        opacity: 1;
        transform: scale(1.1);
        animation: flicker 3s infinite ease-in-out;
      }
    
      }

      @media screen and (max-width: 999px) and (min-width: 450px){
        #container {
          flex-direction: row;
          align-items: center;
          gap: 10px;
        }

        .letter {
          font-size: 200px;
        }
        .mabel-m {
        font-family: 'swomp-sloppy';
        display: inline-block;
        position: relative;
        transition: transform 0.4s ease, opacity 0.4s ease;
      }
        .mabel-m:active {
          transform: scale(1.2) rotate(5deg);
          opacity: 0.8;
      }

      .a:active {
        text-transform: lowercase;
        transform: rotateY(720deg) scale(0.80);
        color: blue;
      }

      .b:active span:nth-child(1){
        transform:translateY(-30px); 
      }

      .b:active span:nth-child(2){
        transform:translateY(30px); 
      }

      .b:active span:nth-child(3){
        transform:translateY(0) scaleY(1);
      }
      .b span:nth-child(3){
        position:absolute;
        top:50%; left: 0;
        transform:translateY(-50%) scaleY(0);
        width: 100%; color: #ffffff;
        background:rgb(84, 2, 106);
        font-family: monospace;
        font-weight: bold;
        font-size: 10px;
        text-align:center;
        margin-left: -5px;
        padding: 10px 10px 10px 10px;
        transition:0.8s;
        border-radius: 1em;
      }

      .e:active {
        transform: rotateX(360deg) scale(0.80);
        color: rgb(255, 125, 164);
      }

      .l:active .flame-l {
        opacity: 1;
        transform: scale(1.1);
        animation: flicker 3s infinite ease-in-out;
      }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="letter mabel-m">
        M
      </div>
      <div class="letter a">
        a
      </div>
      <div class="letter b">
        B
        <span>B</span>
        <span>B</span>
        <span>HEYYY THAT'S ME!</span>
      </div>
      <div class="letter e">
        E
      </div>
      <div class="letter l">
          L
          <span class="flame-l">L</span>
      </div>
    </div>
    
  </body>
  </html>
