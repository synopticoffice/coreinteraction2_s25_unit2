<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alesya Zaytseva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&family=Eczar:wght@400..800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .envelope {
            width: 100%;
            height: 100vh;
            max-width: 100%;  
            display: grid;
            grid-template-columns: repeat(8, minmax(0, 1fr)); 
            grid-template-rows: auto;
            justify-items: center;
            background-color: rgb(216, 62, 39);
            overflow: hidden;
            gap: 0; 
            position: relative; 
        }

        .letter {
            font-family: Almendra;
            font-size: 12vw; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.25em; 
            text-align: center;
            width: 100%;
            height: 100%;
            color: rgb(239, 160, 84);
            position: relative;
            transition: transform 1.5s linear; 
        }

        .letter:hover {
            animation: spin 1.5s linear infinite;
        }

        .spinning {
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin { 
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg); 
            }
        }

        .letterA {
            grid-column: 2 / 3;
        }

        .letterL {
            grid-column: 3 / 4;
        }

        .letterE {
            grid-column: 4 / 5;
        }

        .letterS {
            grid-column: 5 / 6;
        }

        .letterY {
            grid-column: 6 / 7;
        }

        .letterZ {
            grid-column: 7 / 8;
        }

        /* Side columns styled to be on top of the grid */
        .side-column {
            position: absolute;
            top: 0;
            width: 10%;
            z-index: 1;
        }

        .side-column img {
            width: 100%;
            height: auto;
            min-height: 100vh;
            object-fit: cover;
        }

        .side-column.left {
            left: 0;
        }

        .side-column.right {
            right: 0;
        }

        @media screen and (max-width: 500px) {
            .envelope {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }

            .letter {
                font-size: 15vw; 
                padding: 1em;
            }

            .side-column {
                width: 20%;
            }
        }

        html, body {
            height: 100%;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="envelope">
        <div class="side-column left">
            <img src="Flummery_Border(left).png" alt="SideImage1">
        </div>
        <div class="letter letterA" onclick="toggleSpin(event)">A</div>
        <div class="letter letterL" onclick="toggleSpin(event)">L</div>
        <div class="letter letterE" onclick="toggleSpin(event)">E</div>
        <div class="letter letterS" onclick="toggleSpin(event)">S</div>
        <div class="letter letterY" onclick="toggleSpin(event)">Y</div>
        <div class="letter letterZ" onclick="toggleSpin(event)">A</div>
        <div class="side-column right">
            <img src="Flummery_Border(right).png" alt="SideImage2">
        </div>
    </div>

    <script>
        function toggleSpin(event) {
            const letter = event.target;
            letter.classList.toggle('spinning');
        }
    </script>
</body>
</html>
