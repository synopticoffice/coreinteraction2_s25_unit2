<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Cecilia Yang</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Arvo:ital,wght@0,400;0,700;1,400;1,700&family=Hepta+Slab:wght@1..900&display=swap" rel="stylesheet">
        
        <style>
            /* Reset / Global Styles */
            * {
                box-sizing: border-box;
                font-family: "Hepta Slab", serif;
                margin: 0;
                padding: 0;
            }
    
    
    
            @media (min-width: 450px) {
                .name {
                    display: flex;
                    flex-direction: row;
                    width: 100vw;
                    font-size: 104px;
                }
            }
    
            @media (min-width: 650px) {
                .name {
                    font-size: 140px;
                }
            }
    
            @media (min-width: 900px) {
                .name {
                    font-size: 240px;
                }
            }
    
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
    
    
    
            .c { color: blue; 
                font-variation-settings: "wght" 900;
            
            }
    
            .c:hover, .C:hover, .l:hover, .i2:hover{
                background-color:blue;
                color:white;
                
            }
    
            .e:hover, .i1:hover, .a:hover{
                background-color:rgb(235, 133, 255);
                color:red;
                
            }
    
            .c:active, .C:active, .l:active, .i2:active{
                position:relative;
                top:20px;
            }
            .e:active, .i1:active, .a:active{
                position:relative;
                bottom:20px;
            }
    
            
    
            
    
            .e { color: rgb(234, 0, 255); 
                font-variation-settings: "wdth" 60;
                font-variation-settings: "ital" 1;
                font-synthesis: none;
            
            }
    
            .e:hover{
                font-variation-settings: "wght" 900;
    
            }
    
            .C { color: blue; 
                font-variation-settings: "wght" 200;
            
            }
    
            .C:hover{
                background-color:blue;
    
    
            }
    
            .i1 { color: rgb(152, 167, 15); 
                font-variation-settings: "wght" 800;
            
            }
    
    
            .l { color: rgb(221, 63, 238); 
            }
    
            .l:hover{
                font-variation-settings: "wght" 800;
            }
                
    
    
            .i2 { color: rgb(152, 167, 15); 
            
            }
            .a { color: rgb(152, 167, 15); 
            
            }
        </style>
  
  </head>
  <body>
    <div class="name">
      <div class="c">C</div>
      <div class="e">e</div>
      <div class="C">C</div>
      <div class="i1">i</div>
      <div class="l">l</div>
      <div class="i2">i</div>
      <div class="a">a</div>
  </div>
  

    
  </body>
  </html>
