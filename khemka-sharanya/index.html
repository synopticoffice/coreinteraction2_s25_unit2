<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharanya Interactive Name</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        /* General Styles */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #A52A2A; /* Brownish-red background */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Container for the name */
        .name-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allows wrapping if needed on smaller screens */
            gap: 10px; /* Space between letters */
            max-width: 100vw;
            padding: 0 5vw;
        }

        /* Letter styles */
        .letter {
            font-size: 14vw;  /* Scales based on viewport width */
            font-weight: 900;
            color: #B0E0E6; /* Powder blue */
            transition: transform 0.3s ease, color 0.3s ease;
            cursor: pointer;
        }

        /* Hover effect changes text color */
        .letter:hover {
            color: #93C572 !important; /* Soft green */
            transform: scale(1.2);
        }

        /* Responsive Adjustments */
        @media (max-width: 900px) {
            .letter { font-size: 12vw; }
        }

        @media (max-width: 650px) {
            .letter { font-size: 10vw; gap: 6px; }
        }

        @media (max-width: 450px) {
            .letter { font-size: 9vw; gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="name-container">
        <span class="letter">S</span>
        <span class="letter">H</span>
        <span class="letter">A</span>
        <span class="letter">R</span>
        <span class="letter">A</span>
        <span class="letter">N</span>
        <span class="letter">Y</span>
        <span class="letter">A</span>
    </div>

    <script>
        document.querySelectorAll(".letter").forEach(letter => {
            letter.addEventListener("mouseover", () => {
                letter.style.transform = `scale(1.2) rotate(${Math.random() * 10 - 5}deg)`;
            });

            letter.addEventListener("mouseout", () => {
                letter.style.transform = "scale(1)";
            });

            letter.addEventListener("click", () => {
                letter.style.transform = `scale(1.3) rotate(${Math.random() * 360}deg)`;
            });
        });
    </script>

</body>
</html>
