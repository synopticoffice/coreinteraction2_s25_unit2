<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joanna</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #15002e;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .name {
            display: flex;
            font-size: 10vw;
            font-weight: 100;
            gap: 0.2rem;
        }

        .name span {
            transition: transform 0.3s ease, color 0.3s ease;
            cursor: pointer;
        }

        .name span:hover {
            transform: scale(1.2);
            color: #3498db;
        }

        .name span:active {
            animation: spin 0.6s ease-out forwards;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .name {
                font-size: 12vw;
            }
        }

        @media (max-width: 650px) {
            .name {
                font-size: 14vw;
            }
        }

        @media (max-width: 450px) {
            .name {
                font-size: 18vw;
            }
        }
    </style>
</head>
<body>
    <div class="name">
        <span>J</span>
        <span>o</span>
        <span>A</span>
        <span>n</span>
        <span>N</span>
        <span>a</span>
    </div>
</body>
</html>
