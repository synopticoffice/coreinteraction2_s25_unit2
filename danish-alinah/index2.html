<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Alinah Danish</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:ital,opsz,wdth,wght,GRAD@0,8..144,50..150,100..900,-50..100;1,8..144,50..150,100..900,-50..100&display=swap" rel="stylesheet">
  
  </head>
  <style>
    * {
        margin-top: 70;
        padding: 0%;
        box-sizing: border-box;
        
    }

    body {
      height: 100%;
      background-color: rgb(239, 172, 213);
      color: black;
      font-family: "Roboto Serif", serif;
      font-weight: bold;
      font-variation-settings: "grad" -50, 
                                    "wdth" 50; 
    }

    .name-tag {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
  }

  .letter {
    display: inline-block;
    font-size: 10vw;
    font-variation-settings: "wght" 500;
    transition: transform 0.3s ease, font-variation-settings 0.3s ease;
    cursor: pointer;
  }

  .letter:hover {
  transform: scale(1.2) rotate(180deg);
  font-variation-settings: "wght" 800;
  }

.letter:active {
  transform: scale(0.9) rotate(-10deg);
  font-variation-settings: "wght" 300;
  }

@media (max-width: 900px) {
  .letter {
    font-size: 12vw;
  }
}

@media (max-width: 650px) {
  .letter {
    font-size: 14vw;
  }
}

@media (max-width: 450px) {
  .letter {
    font-size: 16vw;
  }
}
  </style>

  <body>
    <div class="name-tag">
      <span class="letter">A</span>
      <span class="letter">l</span>
      <span class="letter">i</span>
      <span class="letter">n</span>
      <span class="letter">a</span>
      <span class="letter">h</span>
    </div>
  </body>
  </html>
