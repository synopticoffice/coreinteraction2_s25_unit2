<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>David - Interactive Typography</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            @font-face {
                font-family: 'OwnersXXWide';
                src: url('OwnersTRIALXXWide-Regular.otf') format('opentype');
                font-weight: normal;
                font-style: normal;
                font-display: swap;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #ffffff;
                overflow: hidden;
                position: relative;
                perspective: 1000px;
            }

            .name-container {
                display: flex;
                gap: -0.5vw;
                padding: 2rem;
                animation: spin3d 20s infinite linear;
                transform-style: preserve-3d;
            }

            @keyframes spin3d {
                0% {
                    transform: rotateY(0deg) rotateX(10deg) scale3d(1, 1, 1);
                }
                50% {
                    transform: rotateY(180deg) rotateX(-10deg) scale3d(1.2, 1.2, 1.2);
                }
                100% {
                    transform: rotateY(360deg) rotateX(10deg) scale3d(1, 1, 1);
                }
            }

            .letter {
                font-family: 'OwnersXXWide', sans-serif;
                font-size: 15vw;
                color: #000000;
                transition: all 0.3s ease;
                cursor: pointer;
                filter: blur(0.3px);
                transform-style: preserve-3d;
            }

            .letter:nth-child(2) {  
                margin-right: -3vw;
            }
            .letter:nth-child(3) {  
                margin-left: -3vw;
            }

            .letter:hover {
                color: #000000;
                transform: translateY(-10px) rotate(5deg);
                filter: blur(0);
            }

            .letter.clicked {
                animation: bounce 0.5s ease;
            }

            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-30px); }
            }

            @media (max-width: 900px) {
                .letter {
                    font-size: 25vw;
                }
            }

            @media (max-width: 650px) {
                .letter {
                    font-size: 30vw;
                }
            }

            @media (max-width: 450px) {
                .letter {
                    font-size: 35vw;
                }
                .name-container {
                    gap:0vw;
                }
            }
        </style>
    </head>
    <body>
        <div class="texture-overlay"></div>
        <div class="name-container">
            <span class="letter">D</span>
            <span class="letter">A</span>
            <span class="letter">V</span>
            <span class="letter">I</span>
            <span class="letter">D</span>
        </div>

        <script>
            document.querySelectorAll('.letter').forEach(letter => {
                letter.addEventListener('click', function() {
                    this.classList.remove('clicked');
                    void this.offsetWidth; 
                    this.classList.add('clicked');
                });
            });
        </script>
    </body>
</html>
