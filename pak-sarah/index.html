<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>core 2 interaction quiz</title>
  <style>
    @import url(https://fonts.googleapis.com/css2?family=Archivo+Black&family=Instrument+Sans:ital,wght@0,400..700;1,400..700);
    
    :root {
      --bg-color: #003fec;
      --text-color: #ffffff;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .name {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    
    .letter {
      font-variation-settings: 'wght' 700;
      color: var(--text-color);
      display: inline-flex;
      justify-content: center;
      align-items: center;
      position: relative;
      margin: 0 1vw;
      transition: all 0.5s ease;
      cursor: pointer;
    }
    

    @media (min-width: 901px) {
      .letter {
        font-size: 20vw;
      }
    }
    
    @media (min-width: 651px) and (max-width: 900px) {
      .letter {
        font-size: 18vw;
      }
    }
    
    @media (min-width: 451px) and (max-width: 650px) {
      .letter {
        font-size: 16vw;
      }
    }
    
    @media (max-width: 450px) {
      .letter {
        font-size: 14vw;
      }
      .name {
        flex-direction: column;
      }
    }
    
    /* Interactive states with personal elements */
    .letter:nth-child(1):hover {
      color: #FF7EB9; /* s */
      transform: scale(1.2);
    }
    
    .letter:nth-child(2):hover {
      color: #7FDBFF; /* a */
      transform: rotate(15deg);
    }
    
    .letter:nth-child(3):hover {
      color: #FFDC00; /* r */
      transform: translateY(-20px);
    }
    
    .letter:nth-child(4):hover {
      color: #f36e31; /* a */
      font-variation-settings: 'wght' 100;
    }
    
    .letter:nth-child(5):hover {
      color: #5ba979; /* h */
      transform: skewX(-15deg);
    }
    
    /* Active states for click interaction */
    .letter:active {
      filter: brightness(1.5);
      transform: scale(0.9);
      transition: all 0.1s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name">
      <div class="letter" tabindex="0">S</div>
      <div class="letter" tabindex="0">A</div>
      <div class="letter" tabindex="0">R</div>
      <div class="letter" tabindex="0">A</div>
      <div class="letter" tabindex="0">H</div>
    </div>
  </div>
</body>
</html>
