<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
      <title>Morissey</title>
  <style> 
    p {
      font-family: "Outfit", sans-serif;
  font-optical-sizing: auto;
  font-weight: bolder;
  font-style: normal;
  font-size: 15vw;
  letter-spacing: 2.5vw;
  padding-left: 1vw;

    }

    .M {
      display: inline-block;
      transition: transform 2s; 
    }
    .M:hover {
      transform: translate(30vw) rotate(90deg) scale(1.5);
    }
    .O {
      display: inline-block;
      transition: transform 2s; 
    }
    .O:hover {
      transform: translate(20vw) rotate(90deg) scale(1.5);
    }
    .R {
      display: inline-block;
      transition: transform 2s; 
    }
    .R:hover {
      transform: translate(10vw) rotate(90deg) scale(1.5);
    }
    .I {
      display: inline-block;
      transition: transform 2s; 
    }
    .I:hover {
      transform: translate(0vw) rotate(-90deg)scale(1.5);
    }
    .S1 {
      display: inline-block;
      transition: transform 2s; 
    }
    .S1:hover {
      transform: translate(-10vw) rotate(-90deg) scale(1.5);
    }
    .S2 {
      display: inline-block;
      transition: transform 2s; 
    }
    .S2:hover {
      transform: translate(-20vw) rotate(-90deg) scale(1.5);
    }
    .E {
      display: inline-block;
      transition: transform 2s; 
    }
    .E:hover {
      transform: translate(-30vw) rotate(-90deg) scale(1.5);
    }
    .Y {
      display: inline-block;
      transition: transform 2s; 
    }
    .Y:hover {
      transform: translate(-40vw) rotate(-90deg) scale(1.5);
    }
    
  </style>
  </head>
  <body>
    <p>
  <span class="M">M</span><span class="O">O</span><span class="R">R</span><span class="I">I</span><span class="S1">S</span><span class="S2">S</span><span class="E">E</span><span class="Y">Y</span>
  </p>
  </body>
  </html>
