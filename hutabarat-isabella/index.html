<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabella Hutabarat</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Rubik:ital,wght@0,300..900;1,300..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"> 
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-color: black;
        }
      
        .name-container {
            display: flex;
            gap: 10px;
        }
        .letter {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-variation-settings: 'wght' 300;
            font-size: 20vw;
            font-weight: bolder;
            color: rgb(255, 0, 208);
            cursor: pointer;
            transition: text-shadow 0.4s ease, font-variation-settings 0.3s ease;
        }

        .letter:hover {
            font-variation-settings: 'wght' 900;
            text-shadow: 0 0 10px rgba(255, 0, 208, 0.8),
                         0 0 20px rgba(255, 0, 208, 0.6),
                         0 0 40px rgba(255, 0, 208, 0.4);
        }

        .letter:active {
            transform: scale(1.2);
        }

        @media (max-width: 900px) {
            .name-container { gap: 8px; }
            .letter { font-size: 18vw; }
        }

        @media (max-width: 650px) {
            .name-container { flex-direction: column; align-items: center; }
            .letter { font-size: 20vw; }
        }

        @media (max-width: 450px) {
            .letter { font-size: 25vw; }
        }
    </style>
</head>

<body>
    <div class="name-container">
        <span class="letter">B</span>
        <span class="letter">E</span>
        <span class="letter">L</span>
        <span class="letter">L</span>
        <span class="letter">A</span>
    </div>
</body>
</html>
