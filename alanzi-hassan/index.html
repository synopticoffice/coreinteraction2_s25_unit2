<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASSAN ALANZI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        height: 100vh;
        font-family: 'Orbitron', sans-serif;
      }

      .name {
        display: flex;
        font-size: 10rem; 
        text-align: center;
        color: white;
        padding: 4%;
        height: 80vh;
        align-items: center;
        transition: color .3s ease-in-out, box-shadow .3s ease-in-out, font-weight 0.3s ease-in-out;
      }

      .name:hover {
        box-shadow: inset 100vw 0 0 0 #0000ff;
        color: white;
        font-weight: bolder;
      }

      .main {
        background-color: black;
        height: 100vh;
      }

      .top {
        background-color: #FF4400;
        display: flex;
        flex-direction: row;
        gap: 10px;
        height: 10vh;
        align-items: center;
        font-size: 1rem;
      }

      .bottom {
        display: flex;
        flex-direction: row;
        gap: 10px;
        height: 10vh;
        align-items: center;
        font-size: 1rem;
      }

      .top-item {
        background-color: #FF4400;
        display: flex;
        flex-grow: 1;
        margin: 20px;
      }

      .bottom-item {
        color: white;
        display: flex;
        flex-grow: 1;
        margin: 20px;
      }

      .ast {
        background-color: #FF4400;
        display: flex;
        flex-grow: 3;
      }      
        
      .empty {
        background-color: white;
        height: 1px;
        width: 100vw;
      }

      @media screen and (max-width: 900px) {
        .name {
          font-size: 10em; 
        }
      }

      @media screen and (max-width: 650px) {
        .name {
          font-size: 5em; 
        }
      }

      @media screen and (max-width: 450px) {
        .name {
          font-size: 2.5em; 
        }
      }
    </style>
</head>
<body>

  <div class="main">
    <div class="top">
      <div class="top-item ast">*</div>
      <div class="top-item">CORE 2<br>INT</div>
      <div class="top-item">UNIT<br>2</div>
    </div>

    <div class="name">HASSAN ALANZI</div>
    
    <div class="empty"></div>

    <div class="bottom">
      <div class="bottom-item">#</div>
      <div class="bottom-item">WEEK<br>10</div>
      <div class="bottom-item">QUIZ<br>02</div>
    </div>
  </div>

</body>
</html>
