<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Your Name Here</title>
      <link rel="stylesheet" href="https://use.typekit.net/hkz0jrp.css">
  </head>
  <body>
  <style>
    *{
      /* font-family: "ad-gothic-variable", sans-serif;
      font-size: 100vh;
      font-variation-settings: "wdth" 1; */
      /* width: 100vw;
      height: 100vh; */
      margin: 0;
    }
    .name{
      font-family: "ad-gothic-variable", sans-serif;
      font-size: 100vh;
      font-variation-settings: "wdth" 1;

      width: 100vw;
      height: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 ;
    }
  .E:hover{
    font-variation-settings: "wdth" 100;
    color: darkorange;
    transition: ease-in-out 0.5s;
  }
  .v:hover{
    font-variation-settings: "wdth" 100;
    color: rgb(255, 221, 0);
    transform: scale(1.3);
    transition: ease-in-out 0.5s;
  }
  .a:hover{
    font-variation-settings: "wdth" 100;
    color: rgb(129, 231, 62);
    filter: blur(10);
    transition: ease-in-out 0.5s;
  }
  .L:hover{
    font-variation-settings: "wdth" 100;
    color: rgb(75, 201, 251);
    transform: rotateX(90deg);
    transition: ease-in-out 0.5s;
  }
  .i:hover{
    font-variation-settings: "wdth" 100;
    color: rgb(254, 92, 230);
    transition: ease-in-out 0.5s;
  }
  </style>
<div class="name">
  <section class="E">
    <p>E</p>
  </section>
  <section class="v">
    <p>v</p>
  </section>
  <section class="a">
    <p>a &nbsp;</p>
  </section>
  <!-- <sectionc>
    <p>&nbsp; &nbsp;</p>
  </section> -->
  <section class="L">
    <p>L</p>
  </section>
  <section class="i">
    <p>i</p>
  </section>
</div>
  </body>
  </html>
