<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Khanh</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
  
  </head>
  <style>
    body{
      font-family: "Fjalla One", sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 20pt;
    }
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .envelope {
          margin:auto;
          margin-top:100px;
          width: 500px; 
          height: 500px; 
          border: 20px solid #ae0000; 
          padding: 10px; 
          color:#ae0000;
          }

        .k{
          position:relative;
          top: 70px;
          left: -10px;
          font-size: 200pt;
          transform: scaleY(1.7)       
        }
        .h{
          position:relative;
          top: -283px;
          left: 120px;
          font-size: 160pt;
          transform: scaleY(1.6)       
        }
        .a{
          font-size: 200pt;
          position:relative;
          top: -625px;
          left: 230px;
          font-size: 160pt;
          transform: scaleY(1.3)       

        }
        .n{
          font-size: 200pt;
          position:relative;
          top: -690px;
          left: 230px;
          font-size: 160pt;
          transform: scaleY(1.2)       
        }
        .h2{
          position:relative;
          top: -1057px;
          left: 320px;
          font-size: 200pt;
          transform: scaleY(1.6)       

        }
        .envelope:hover {
            animation: crazytext 2s ease infinite; /* Using the short form */
        }

        @keyframes crazytext {
            0% {
                font-weight: 100;
                font-variation-settings: "grad" -50,
                                          "wdth" 50;
            }
            25% {
                font-weight: 900;
                font-variation-settings: "grad" -50,
                                         "wdth" 50;
            }
            50% {
                font-weight: 900;
                font-variation-settings: "grad" 100,
                                         "wdth" 50;
            }
            75% {
                font-weight: 100;
                font-variation-settings: "grad" -50,
                                         "wdth" 150;
            }
            100% {
                font-weight: 100;
                font-variation-settings: "grad" -50,
                                          "wdth" 50;
            }
        }
        @media screen and (max-width: 450px) {
          .envelope {
          margin:auto;
          margin-top:100px;
          width: 500px; 
          height: 500px;
          border: 20px solid #ae0000; 
          padding: 10px; 
          color:#ff0000;
          }
      }
      @media screen and (max-width: 650px) {
          .envelope {
          margin:auto;
          margin-top:100px;
          width: 500px; 
          height: 500px; 
          border: 20px solid #ae0000; 
          padding: 10px; 
          color:#0011ff;
          }
        }
        @media screen and (max-width: 650px) {
          .envelope {
          margin:auto;
          margin-top:100px;
          width: 500px; 
          height: 500px;
          border: 20px solid #ae0000; 
          padding: 10px; 
          color:#ff006f;
          }
        }
  </style>
  <body>
    <div class="envelope">
      <div class="k">K</div>
      <div class="h">H</div>
      <div class="a">a</div>
      <div class="n">n</div>
      <div class="h2">h</div>

    </div>
  </body>
  </html>
