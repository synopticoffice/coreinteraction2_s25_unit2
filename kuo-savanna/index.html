      <title>Savanna Kuo</title>
  
  </head>
  <body>


    <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: content-box;
      }

      body {
          display: grid;
          place-items: center;
          height: 100vh;
          font-family: 'Times New Roman', Times, serif;
      }

      div {
          font-size: 20em;
          text-align: center;
      }

      @media screen and (max-width: 900px) {
          div {
              font-size: 10em;
          }
      }
      
      @media screen and (max-width: 650px) {
          div {
              font-size: 5em;
          }
      }

      @media screen and (max-width: 450px) {
          div {
              font-size: 2.5em;
          }
      }

      .name {
        display: flex;
        justify-content: center;
        gap: 10px;
        color: pink;
        font-family: "Caveat", cursive;
        font-weight: bold;
      }
      
      .name span:hover {
        transform:scale(1.2);
        transition: 0.5s ease;
        color: orange;
      }
      
      .name span:active {
        filter: blur(0.1em);
        color: orange;
      }

  </style>
  
  <div class="name">
  <span>S</span> 
  <span>a</span> 
  <span>v</span> 
  <span>a</span> 
  <span>n</span> 
  <span>n</span> 
  <span>a</span> 
   </div>


  </body>
