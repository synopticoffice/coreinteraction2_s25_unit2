<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi'Lah Nametag</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&display=swap');

        body {
            font-family: "Ballet", cursive;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hello-text {
            font-family: "Gabarito", sans-serif;
            font-size: clamp(2rem, 4vw, 2.5rem);
            text-align: center;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            width: 100%;
        }

        .letter-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 90vh;
            z-index: 2;
            position: absolute;
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%);
        }

        .letter {
            font-size: clamp(5rem, 25vw, 25rem);
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s ease, filter 0.3s ease;
            animation: float 3s infinite alternate;
            animation-delay: calc(var(--index) * 0.2s);
        }
        
        .letter:hover {
            transform: translateY(-20px) scale(1.2);
            filter: brightness(1.3);
        }
        
        .letter:active {
            transform: scale(0.9);
            filter: brightness(0.8);
        }
        
        #letter-M { 
            color: #FF1493;
            --index: 0;
        }
        
        #letter-i { 
            color: #FF4500; 
            --index: 1;
        }
        
        #letter-apostrophe { 
            color: #9400D3; 
            --index: 2;
        }
        
        #letter-L { 
            color: #1E90FF; 
            --index: 3;
        }
        
        #letter-a { 
            color: #32CD32; 
            --index: 4;
        }
        
        #letter-h { 
            color: #FFD700; 
            --index: 5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 600px) {
            .letter {
                font-size: clamp(4rem, 22vw, 22rem);
            }
        }
    </style>
</head>
<body>
    <div class="hello-text">HELLO WORLD, I AM</div>
    <div class="letter-container">
        <div class="letter" id="letter-M">M</div>
        <div class="letter" id="letter-i">i</div>
        <div class="letter" id="letter-apostrophe">'</div>
        <div class="letter" id="letter-L">L</div>
        <div class="letter" id="letter-a">a</div>
        <div class="letter" id="letter-h">h</div>
    </div>
</body>
</html>
