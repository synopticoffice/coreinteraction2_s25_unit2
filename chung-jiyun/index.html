<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Jiyun</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
    }

    .name {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    .letter {
      font-size: 10vw;
      font-variation-settings: "wght" 400;
      transition: transform 0.2s, color 0.2s, font-variation-settings 0.3s;
      cursor: pointer;
      margin: 0 0.1em;
    }

    .letter:hover {
      transform: scale(1.2);
      color: royalblue;
      font-variation-settings: "wght" 700;
    }

    .letter:active {
      transform: scale(0.9);
      color: tomato;
      font-variation-settings: "wght" 200;
    }

    @media (max-width: 900px) {
      .letter {
        font-size: 8vw;
      }
    }

    @media (max-width: 650px) {
      .letter {
        font-size: 12vw;
      }
    }

    @media (max-width: 450px) {
      .letter {
        font-size: 16vw;
      }
    }
  </style>
</head>
<body>
  <div class="name">
    <span class="letter">J</span>
    <span class="letter">i</span>
    <span class="letter">y</span>
    <span class="letter">u</span>
    <span class="letter">n</span>
  </div>
</body>
</html>
