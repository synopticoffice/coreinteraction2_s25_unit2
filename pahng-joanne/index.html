<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joanne</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Recursive:wght@300..1000&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            font-family: 'Recursive', sans-serif;
            overflow: hidden;
        }

        .name-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.2em;
            padding: 1em;
        }

        .letter {
            font-size: 10vw;
            font-variation-settings: "wght" 300, "CASL" 0;
            transition: all 0.3s ease;
            cursor: pointer;
            color: #333;
        }

        .letter:hover {
            font-variation-settings: "wght" 900, "CASL" 1;
            transform: scale(1.1);
            color: #000;
        }

        .letter:active {
            transform: scale(0.9);
        }

        @media (max-width: 450px) {
            .letter {
                font-size: 15vw;
            }
        }

        @media (min-width: 451px) and (max-width: 650px) {
            .letter {
                font-size: 12vw;
            }
        }

        @media (min-width: 651px) and (max-width: 900px) {
            .letter {
                font-size: 10vw;
            }
        }

        @media (min-width: 901px) {
            .letter {
                font-size: 8vw;
            }
        }
    </style>
</head>
<body>
    <div class="name-container">
        <span class="letter">J</span>
        <span class="letter">o</span>
        <span class="letter">a</span>
        <span class="letter">n</span>
        <span class="letter">n</span>
        <span class="letter">e</span>
        
    </div>
</body>
</html>
