<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucas Hsu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "Archivo", sans-serif;
      font-size: 200px;
      font-optical-sizing: auto;
      font-weight: 300;
      font-style: italic;
      font-variation-settings: "500";
      margin: 10%;

    }

    .hsuworks {
      visibility: hidden;
    }

    .envelope div {
      display: inline-block;
      margin-right: -40px;
    }

    .L:hover {
      color: red;
      font-weight: 400;
    }

    .L:active {
      color: blue;
    }

    .U:hover {
      color: red;
      font-weight: 500;
    }

    .U:active {
      color: blue;
    }

    .C:hover {
      color: red;
      font-weight: 600;
    }

    .C:active {
      color: blue;
    }

    .A:hover {
      color: red;
      font-weight: 700;
    }

    .A:active {
      color: blue;
    }

    .S:hover {
      color: red;
      font-weight: 800;
    }

    .S:active {
      color: blue;
    }

    .hsuworks:hover {
      visibility: visible;
    }

    .S:hover+.hsuworks {
      visibility: visible;
    }



    @media only screen and (max-width: 480px) {
      body {
        font-size: 100px;
      }

      .envelope div {
        display: inline-block;
        margin-right: -20px;
      }
    }

    @media only screen and (max-width: 650px) and (min-width: 481px) {
      body {
        font-size: 150px;
      }

      .envelope div {
        display: inline-block;
        margin-right: -30px;
      }
    }
  </style>

</head>

<body>
  <div class="envelope">
    <div class="L">
      L
    </div>
    <div class="U">
      u
    </div>
    <div class="C">
      c
    </div>
    <div class="A">
      a
    </div>
    <div class="S">
      s
    </div>
    <div class="hsuworks">
      .hsu
    </div>
  </div>

</body>

</html>
