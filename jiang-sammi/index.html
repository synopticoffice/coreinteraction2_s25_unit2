<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Tag</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+3D&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
            overflow: hidden;
            font-family: 'Rock 3D', system-ui;
        }
        .name-container {
            display: flex;
            gap: 5px;
        }
        .letter {
            font-size: 12vw; /* Adjusted to fit the screen */
            font-weight: 400;
            font-style: normal;
            color: white;
            transition: transform 0.2s, color 0.5s;
            cursor: pointer;
            position: relative;
        }
        .letter:hover {
            transform: scale(1.2);
            color: var(--hover-color);
            animation: jump 1s ease-in-out infinite;
        }
        .letter:active {
            transform: scale(0.9) translateY(-10px);
        }
        @keyframes jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
            100% { transform: translateY(0); }
        }
        @media (max-width: 900px) {
            .letter { font-size: 10vw; }
        }
        @media (max-width: 650px) {
            .letter { font-size: 8vw; }
        }
        @media (max-width: 450px) {
            .letter { font-size: 6vw; }
        }
    </style>
</head>
<body>
    <div class="name-container" id="nameTag"></div>
    <script>
        const name = "Sammi Jiang".split("");
        const container = document.getElementById("nameTag");
        let isBlue = true;
        const blueShades = ["#3b82f6", "#2563eb", "#1d4ed8", "#1e40af", "#1e3a8a"];
        const purpleShades = ["#a855f7", "#9333ea", "#7e22ce", "#6b21a8", "#581c87"];

        function updateColors() {
            const colors = isBlue ? blueShades : purpleShades;
            document.querySelectorAll(".letter").forEach((letter, index) => {
                letter.style.setProperty('--hover-color', colors[index % colors.length]);
            });
            isBlue = !isBlue;
        }

        name.forEach((letter, index) => {
            const span = document.createElement("span");
            span.textContent = letter;
            span.classList.add("letter");
            span.style.setProperty('--hover-color', blueShades[index % blueShades.length]);

            // Add the click event to move the letter without disappearing
            span.addEventListener("click", () => {
                span.style.position = "absolute"; // Allow free movement
                span.style.top = `${Math.random() * 100}vh`; // Random vertical position
                span.style.left = `${Math.random() * 100}vw`; // Random horizontal position
                span.style.transition = "all 0.3s ease-in-out"; // Smooth transition for movement
            });

            container.appendChild(span);
        });

        setInterval(updateColors, 2000);
    </script>
</body>
</html>
